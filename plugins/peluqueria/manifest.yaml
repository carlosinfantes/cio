# Tipos de entidades de contexto específicas del dominio
context_entities:
  - type: "cliente"
    display_name: "Cliente"
    description: "Persona que recibe servicios del salón"
    attributes:
      - name: "tipo_cabello"
        type: "enum"
        enum_values: ["liso", "ondulado", "rizado", "muy_rizado"]
        description: "Textura natural del cabello"
      - name: "condicion_cabello"
        type: "enum"
        enum_values: ["saludable", "dañado", "teñido", "procesado", "mixto"]
        description: "Estado actual del cabello"
      - name: "tono_piel"
        type: "enum"
        enum_values: ["muy_claro", "claro", "medio", "oscuro", "muy_oscuro"]
        description: "Tono de piel del cliente"
      - name: "subtono_piel"
        type: "enum"
        enum_values: ["frío", "cálido", "neutro"]
        description: "Subtono de la piel"
      - name: "forma_rostro"
        type: "enum"
        enum_values: ["ovalado", "redondo", "cuadrado", "corazón", "alargado", "diamante"]
        description: "Forma del rostro"

  - type: "servicio"
    display_name: "Servicio"
    description: "Servicio ofrecido por el salón"
    attributes:
      - name: "categoria"
        type: "enum"
        enum_values: ["corte", "color", "tratamiento", "peinado", "maquillaje", "uñas", "barbería", "depilación"]
        description: "Categoría del servicio"
      - name: "duracion_minutos"
        type: "number"
        description: "Duración estimada en minutos"
      - name: "precio"
        type: "number"
        description: "Precio del servicio"
      - name: "nivel_complejidad"
        type: "enum"
        enum_values: ["básico", "intermedio", "avanzado", "especializado"]
        description: "Nivel de complejidad técnica"

  - type: "producto"
    display_name: "Producto"
    description: "Producto utilizado o vendido en el salón"
    attributes:
      - name: "categoria"
        type: "enum"
        enum_values: ["shampoo", "acondicionador", "tratamiento", "styling", "color", "herramientas", "accesorios"]
        description: "Categoría del producto"
      - name: "marca"
        type: "string"
        description: "Marca del producto"
      - name: "uso"
        type: "enum"
        enum_values: ["profesional", "reventa", "ambos"]
        description: "Tipo de uso del producto"

  - type: "cita"
    display_name: "Cita"
    description: "Reservación de servicios"
    attributes:
      - name: "tipo"
        type: "enum"
        enum_values: ["nueva", "seguimiento", "retoque", "emergencia", "consulta"]
        description: "Tipo de cita"
      - name: "servicios"
        type: "array"
        description: "Lista de servicios reservados"
      - name: "estilista_asignado"
        type: "string"
        description: "Estilista responsable"
      - name: "duracion_total"
        type: "number"
        description: "Duración total estimada"

  - type: "empleado"
    display_name: "Empleado"
    description: "Miembro del equipo del salón"
    attributes:
      - name: "rol"
        type: "enum"
        enum_values: ["estilista", "colorista", "asistente", "recepcionista", "barbero", "manicurista", "maquillista"]
        description: "Rol en el salón"
      - name: "nivel"
        type: "enum"
        enum_values: ["junior", "semi_senior", "senior", "master", "director"]
        description: "Nivel de experiencia"
      - name: "especialidades"
        type: "array"
        description: "Áreas de especialización"
      - name: "comision_porcentaje"
        type: "number"
        description: "Porcentaje de comisión"

# Dominios de decisión para categorización
decision_domains:
  - imagen_personal
  - técnica_corte
  - coloración
  - tratamientos_capilares
  - gestión_negocio
  - marketing_digital
  - atención_cliente
  - formación_equipo
  - productos
  - tendencias
  - precios
  - promociones

# Directorio de prompts personalizados
prompts_dir: "prompts"
